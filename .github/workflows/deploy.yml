name: Deploy Website

on:
  push:
    branches:
      - main # Se ejecuta cuando subes cambios a la rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Install and Build
        run: |
          npm install
          npm run build # Esto genera la carpeta /dist
        env:
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}

